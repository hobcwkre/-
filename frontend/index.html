<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>櫃買市場蒙地卡羅回測分析</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
<style>
body{font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif}
.tabular{font-variant-numeric:tabular-nums}
</style>
</head>
<body class="bg-slate-100 text-slate-900">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef, useCallback} = React;
const API = "";  // same origin

const fmtPct = (x, sign) => (x==null || !isFinite(x)) ? "-" : ((sign && x>0 ? "+" : "") + (x*100).toFixed(2) + "%");
const fmtNum = (x, d=2) => (x==null || !isFinite(x)) ? "-" : Number(x).toLocaleString("zh-TW",{maximumFractionDigits:d});
const retColor = x => (x==null || !isFinite(x) || x===0) ? "" : (x>0 ? "text-red-600" : "text-emerald-700");

async function apiGet(path){ const r = await fetch(API+path); if(!r.ok) throw new Error(await r.text()); return r.json(); }
async function apiPost(path, body){
  const r = await fetch(API+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  if(!r.ok){ let msg; try{ const j=await r.json(); msg=JSON.stringify(j.detail||j);}catch{ msg=r.statusText; } throw new Error(msg); }
  return r.json();
}

/* ---------- shared UI ---------- */
function Card({title, children, className=""}){
  return <div className={"bg-white rounded-xl border border-slate-200 shadow-sm p-5 "+className}>
    {title && <h2 className="text-sm font-bold text-slate-700 mb-3">{title}</h2>}
    {children}
  </div>;
}
function Field({label, children}){
  return <div className="flex flex-col gap-1">
    <label className="text-xs text-slate-500">{label}</label>
    {children}
  </div>;
}
const inputCls = "border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500";
function Metric({label, value, cls="", onDetail}){
  return <div onClick={onDetail}
    className={"bg-white rounded-xl border border-slate-200 shadow-sm px-4 py-3 relative "
      +(onDetail?"cursor-pointer hover:border-blue-400 hover:shadow":"")}>
    {onDetail && <span className="absolute top-1.5 right-2.5 text-slate-300 text-xs" title="點擊查看公式與計算">ⓘ</span>}
    <div className="text-xs text-slate-500">{label}</div>
    <div className={"text-xl font-bold tabular "+cls}>{value}</div>
  </div>;
}
function DetailModal({detail, onClose}){
  useEffect(()=>{
    const onKey = e=>{ if(e.key==="Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return ()=>document.removeEventListener("keydown", onKey);
  },[onClose]);
  if(!detail) return null;
  return <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={onClose}>
    <div className="bg-white rounded-2xl shadow-2xl max-w-xl w-full p-6 max-h-[85vh] overflow-y-auto"
         onClick={e=>e.stopPropagation()} role="dialog" aria-modal="true">
      <div className="flex justify-between items-start mb-3">
        <h3 className="font-bold text-base">{detail.title}</h3>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-xl leading-none px-1">✕</button>
      </div>
      <div className="text-xs font-bold text-slate-500 mb-1">公式</div>
      <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm font-mono whitespace-pre-wrap mb-4">{detail.formula}</div>
      <div className="text-xs font-bold text-slate-500 mb-1">代入實際數字</div>
      <table className="w-full text-sm tabular mb-4">
        <tbody>{detail.steps.map(([k,v],i)=>
          <tr key={i} className="border-b border-slate-100">
            <td className="py-1.5 text-slate-500 pr-3 align-top">{k}</td>
            <td className="text-right font-medium break-all">{v}</td>
          </tr>)}</tbody>
      </table>
      {detail.note && <div className="text-xs text-slate-400 leading-relaxed">{detail.note}</div>}
    </div>
  </div>;
}
function PlotBox({spec, height=340}){
  const ref = useRef(null);
  useEffect(()=>{
    if(ref.current && spec){
      Plotly.newPlot(ref.current, spec.data, {...spec.layout,
        margin:{l:60,r:20,t:30,b:40}, font:{family:'"Segoe UI","Noto Sans TC",sans-serif', size:12},
        paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:"rgba(0,0,0,0)"},
        {displayModeBar:false, responsive:true});
    }
    return ()=>{ if(ref.current) Plotly.purge(ref.current); };
  },[spec]);
  return <div ref={ref} style={{height}}/>;
}
function RegressionTable({reg}){
  if(!reg || !reg.rows) return <div className="text-sm text-slate-400">樣本不足，無法計算迴歸。</div>;
  return <div className="overflow-x-auto">
    <table className="w-full text-sm tabular">
      <thead><tr className="text-xs text-slate-500 border-b border-slate-200">
        <th className="text-left py-2 pr-3"></th><th className="text-right px-3">Coef</th>
        <th className="text-right px-3">Std err</th><th className="text-right px-3">t</th>
        <th className="text-right px-3">P&gt;|t|</th><th className="text-right px-3">[0.025</th>
        <th className="text-right px-3">0.975]</th></tr></thead>
      <tbody>{reg.rows.map(r=>
        <tr key={r.name} className="border-b border-slate-100">
          <td className="py-2 pr-3 font-medium">{r.name}</td>
          <td className="text-right px-3">{r.coef.toFixed(4)}</td>
          <td className="text-right px-3">{r.std_err.toFixed(4)}</td>
          <td className="text-right px-3">{r.t.toFixed(3)}</td>
          <td className="text-right px-3">{r.p.toFixed(3)}</td>
          <td className="text-right px-3">{r.ci_low.toFixed(4)}</td>
          <td className="text-right px-3">{r.ci_high.toFixed(4)}</td>
        </tr>)}</tbody>
    </table>
    <div className="text-xs text-slate-400 mt-2">n = {reg.n}、R² = {reg.r2.toFixed(3)}。應變數：策略日報酬；自變數：標的收盤價日報酬。</div>
  </div>;
}

/* ---------- upload custom data ---------- */
function UploadCard({onUploaded}){
  const fileRef = useRef(null);
  const [dsName, setDsName] = useState("");
  const [msg, setMsg] = useState(null);
  const [busy, setBusy] = useState(false);
  const doUpload = async ()=>{
    const f = fileRef.current && fileRef.current.files[0];
    if(!f){ setMsg({err:"請先選擇 CSV 檔案"}); return; }
    setBusy(true); setMsg(null);
    try{
      const fd = new FormData();
      fd.append("file", f);
      fd.append("name", dsName);
      const r = await fetch(API+"/api/upload", {method:"POST", body:fd});
      const j = await r.json();
      if(!r.ok) throw new Error(typeof j.detail==="string" ? j.detail : JSON.stringify(j.detail||j));
      setMsg({ok:`已上傳「${j.name}」：${j.rows} 個交易日（${j.start} ~ ${j.end}），已加入「自訂資料」類別（代號 ${j.code}）。`});
      setDsName(""); fileRef.current.value="";
      onUploaded(j);
    }catch(e){ setMsg({err:String(e.message||e)}); }
    setBusy(false);
  };
  return <Card title="上傳自己的資料（CSV）">
    <div className="grid md:grid-cols-3 gap-3 items-end">
      <Field label="CSV 檔案（需含日期與收盤價欄位）">
        <input type="file" accept=".csv,text/csv" ref={fileRef}
          className="text-sm file:mr-3 file:rounded-lg file:border-0 file:bg-slate-200 file:px-4 file:py-2 file:text-sm file:font-medium hover:file:bg-slate-300"/>
      </Field>
      <Field label="名稱（留空則用檔名）">
        <input type="text" className={inputCls} value={dsName} maxLength="60"
          placeholder="例：我的自組指數" onChange={e=>setDsName(e.target.value)}/>
      </Field>
      <button onClick={doUpload} disabled={busy}
        className="bg-slate-700 hover:bg-slate-800 disabled:bg-slate-300 text-white rounded-lg px-4 py-2 text-sm font-bold">
        {busy?"上傳中...":"上傳"}
      </button>
    </div>
    {msg && msg.ok && <div className="text-sm text-emerald-700 mt-3">{msg.ok}</div>}
    {msg && msg.err && <div className="text-sm text-red-600 mt-3">{msg.err}</div>}
    <div className="text-xs text-slate-400 mt-3">
      欄位名稱支援：日期＝date／日期／交易日期（西元或民國年皆可）；收盤＝close／Adj Close／收盤／收盤價。
      編碼支援 UTF-8 與 Big5；同名資料集會被覆蓋。上傳後可與上櫃股票、ETF、權證混搭回測。
    </div>
  </Card>;
}

/* ---------- page 1: setup ---------- */
function SetupPage({state, setState, onRun, running}){
  const {categories, industries, securities, category, industry, secCode, chips,
         start, end, strategy, params, capital, riskPct, leverage, error} = state;
  const set = patch => setState(s=>({...s, ...patch}));

  useEffect(()=>{ apiGet("/api/categories").then(d=>set({
    categories:d.categories,
    category: d.categories.includes(category) ? category : (d.categories[0]||"")
  })); },[state.reloadCats||0]);
  useEffect(()=>{
    if(!category) return;
    if(category==="股票"){ apiGet("/api/industries?category=股票").then(d=>set({industries:d.industries, industry:""})); }
    else set({industries:[], industry:""});
  },[category]);
  useEffect(()=>{
    if(!category) return;
    const q = new URLSearchParams({category}); if(industry) q.set("industry", industry);
    apiGet("/api/securities?"+q).then(d=>set({securities:d.securities, secCode:d.securities[0]?.code||""}));
  },[category, industry]);

  const addChip = ()=>{
    const sec = securities.find(s=>s.code===secCode);
    if(sec && !chips.some(c=>c.code===sec.code)) set({chips:[...chips, sec]});
  };
  const [codeInput, setCodeInput] = useState("");
  const [codeErr, setCodeErr] = useState("");
  const addByCode = async ()=>{
    const q = codeInput.trim();
    if(!q) return;
    setCodeErr("");
    if(chips.some(c=>c.code===q)){ setCodeInput(""); return; }
    try{
      const info = await apiGet("/api/security/"+encodeURIComponent(q));
      set({chips:[...chips, info]});
      setCodeInput("");
    }catch(e){
      let msg = String(e.message||e);
      try{ msg = JSON.parse(msg).detail || msg; }catch(_){}
      setCodeErr(msg);
    }
  };
  return <div className="grid gap-4">
    <Card title="標的選擇（上櫃：股票／ETF／權證，另可上傳自訂資料）">
      <div className="grid md:grid-cols-4 gap-3 items-end">
        <Field label="1. 市場類別">
          <select className={inputCls} value={category} onChange={e=>set({category:e.target.value})}>
            {categories.map(c=><option key={c}>{c}</option>)}
          </select>
        </Field>
        <Field label="2. 產業分類（僅股票）">
          <select className={inputCls} value={industry} disabled={category!=="股票"}
                  onChange={e=>set({industry:e.target.value})}>
            <option value="">全部產業</option>
            {industries.map(i=><option key={i.code} value={i.code}>{i.name}</option>)}
          </select>
        </Field>
        <Field label={"3. 個股／商品（"+securities.length+" 檔）"}>
          <select className={inputCls} value={secCode} onChange={e=>set({secCode:e.target.value})}>
            {securities.map(s=><option key={s.code} value={s.code}>{s.code}　{s.name}（{s.board}）</option>)}
          </select>
        </Field>
        <button onClick={addChip}
          className="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-bold">＋ 加入</button>
      </div>
      <div className="flex flex-wrap gap-3 items-end mt-3">
        <div className="flex-none w-56">
          <Field label="或直接輸入代碼（例：6488、00679B、705674、U1）">
            <input type="text" className={inputCls} value={codeInput}
              onChange={e=>{setCodeInput(e.target.value); setCodeErr("");}}
              onKeyDown={e=>{ if(e.key==="Enter") addByCode(); }}
              placeholder="輸入代碼後按 Enter"/>
          </Field>
        </div>
        <button onClick={addByCode}
          className="bg-slate-700 hover:bg-slate-800 text-white rounded-lg px-4 py-2 text-sm font-bold">以代碼加入</button>
        {codeErr && <span className="text-sm text-red-600 pb-2">{codeErr}</span>}
      </div>
      <div className="flex flex-wrap gap-2 mt-4">
        {chips.length===0 && <span className="text-sm text-slate-400">尚未加入標的，可複選多檔。</span>}
        {chips.map(c=>
          <span key={c.code} className="inline-flex items-center gap-2 bg-slate-100 border border-slate-200 rounded-full pl-3 pr-1 py-1 text-sm">
            <span className="font-medium">{c.code} {c.name}</span>
            <span className="text-xs text-slate-500">{c.category==="自訂資料" ? "自訂" : c.board+(c.category!=="上櫃" ? "・"+c.category : "")}</span>
            <button className="w-6 h-6 rounded-full hover:bg-slate-200 text-slate-500"
                    onClick={()=>set({chips:chips.filter(x=>x.code!==c.code)})}>✕</button>
          </span>)}
      </div>
    </Card>
    <UploadCard onUploaded={info=>{
      set({reloadCats:(state.reloadCats||0)+1, category:"自訂資料"});
    }}/>
    <Card title="回測參數">
      <div className="grid md:grid-cols-3 lg:grid-cols-6 gap-3">
        <Field label="開始日期"><input type="date" className={inputCls} value={start} onChange={e=>set({start:e.target.value})}/></Field>
        <Field label="結束日期"><input type="date" className={inputCls} value={end} onChange={e=>set({end:e.target.value})}/></Field>
        <Field label="策略類型">
          <select className={inputCls} value={strategy} onChange={e=>set({strategy:e.target.value})}>
            <option value="ma">均線交叉</option><option value="rsi">RSI</option>
          </select>
        </Field>
        {strategy==="ma" ? <React.Fragment>
          <Field label="短期均線"><input type="number" className={inputCls} value={params.short}
            onChange={e=>set({params:{...params, short:+e.target.value}})}/></Field>
          <Field label="長期均線"><input type="number" className={inputCls} value={params.long}
            onChange={e=>set({params:{...params, long:+e.target.value}})}/></Field>
        </React.Fragment> : <React.Fragment>
          <Field label="RSI 週期"><input type="number" className={inputCls} value={params.period}
            onChange={e=>set({params:{...params, period:+e.target.value}})}/></Field>
          <Field label="買進/賣出門檻">
            <div className="flex gap-2">
              <input type="number" className={inputCls+" w-full"} value={params.lower}
                onChange={e=>set({params:{...params, lower:+e.target.value}})}/>
              <input type="number" className={inputCls+" w-full"} value={params.upper}
                onChange={e=>set({params:{...params, upper:+e.target.value}})}/>
            </div>
          </Field>
        </React.Fragment>}
      </div>
      <div className="grid md:grid-cols-3 lg:grid-cols-6 gap-3 mt-3">
        <Field label="初始本金 (NTD)"><input type="number" className={inputCls} value={capital} step="100000"
          onChange={e=>set({capital:+e.target.value})}/></Field>
        <Field label="單筆風險%（停損）"><input type="number" className={inputCls} value={riskPct} step="1" min="0.5"
          onChange={e=>set({riskPct:+e.target.value})}/></Field>
        <Field label="槓桿倍數"><input type="number" className={inputCls} value={leverage} step="0.5" min="0.5" max="10"
          onChange={e=>set({leverage:+e.target.value})}/></Field>
      </div>
      <div className="mt-5 flex items-center gap-4">
        <button onClick={onRun} disabled={running || chips.length===0}
          className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white rounded-lg px-6 py-2.5 text-sm font-bold">
          {running ? "回測中..." : "執行回測"}
        </button>
        {running && <div className="animate-pulse text-sm text-slate-500">正在計算，請稍候…</div>}
        {error && <div className="text-sm text-red-600">{error}</div>}
      </div>
      <div className="text-xs text-slate-400 mt-3">
        訊號於次一交易日收盤執行；單筆風險%＝該筆交易的權益停損門檻；成本：手續費 0.1425%（買賣各一次）＋賣出證交稅 0.3%，按槓桿名目計。
      </div>
    </Card>
  </div>;
}

/* ---------- page 2: backtest results ---------- */
function csvDownload(filename, rows, headers){
  const escCell = v => {
    const s = v==null ? "" : String(v);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const lines = [headers.join(",")].concat(rows.map(r=>headers.map(h=>escCell(r[h])).join(",")));
  // ﻿ BOM so Excel opens UTF-8 (Chinese headers) correctly; \r\n for Excel
  const blob = new Blob(["﻿"+lines.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);   // Firefox needs the anchor in the DOM
  a.click();
  // revoking immediately can cancel the download in some browsers — defer it
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 2000);
}
function p2Details(r){
  const eq = r.equity_curve, dts = r.dates, m = r.metrics;
  const n = eq.length, E0 = eq[0], E1 = eq[n-1];
  const rets = []; for(let i=1;i<n;i++) rets.push(eq[i]/eq[i-1]-1);
  const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
  const sd = Math.sqrt(rets.reduce((a,b)=>a+(b-mean)*(b-mean),0)/rets.length);
  const days = (new Date(dts[n-1]) - new Date(dts[0]))/864e5;
  const years = days/365.25;
  // max drawdown episode (peak & trough)
  let peak = eq[0], peakI = 0, mdd = 0, troughI = 0, mddPeakI = 0;
  eq.forEach((v,i)=>{
    if(v>peak){ peak=v; peakI=i; }
    const dd = v/peak-1;
    if(dd<mdd){ mdd=dd; troughI=i; mddPeakI=peakI; }
  });
  const wins = r.trades.filter(t=>t.return>0), losses = r.trades.filter(t=>t.return<0);
  const avgW = wins.length ? wins.reduce((a,t)=>a+t.return,0)/wins.length : NaN;
  const avgL = losses.length ? losses.reduce((a,t)=>a+t.return,0)/losses.length : NaN;
  const reasonCount = reason => r.trades.filter(t=>t.reason===reason).length;
  const F = (x,d=6)=> (x==null||!isFinite(x)) ? "-" : Number(x).toFixed(d);
  const vol = sd*Math.sqrt(252);
  return {
    total: {title:"報酬率", formula:"報酬率 = 期末權益 ÷ 期初本金 − 1",
      steps:[["期初本金 E₀（第一天權益）", fmtNum(E0)],["期末權益 E₁（最後一天權益）", fmtNum(E1)],
        ["計算", `${fmtNum(E1)} ÷ ${fmtNum(E0)} − 1 = ${F(E1/E0-1)}`],
        ["顯示值", fmtPct(m.total_return,true)]],
      note:"權益曲線每日以收盤價結算，已扣交易成本（手續費 0.1425%×買賣各一次＋賣出證交稅 0.3%，按槓桿名目計）。可用「匯出每日權益 CSV」的第一列與最後一列核對。"},
    vol: {title:"波動率（年化標準差）", formula:"波動率 = STDEV.P(每日報酬率) × √252",
      steps:[["每日報酬率樣本數 n", rets.length],["日報酬平均 μ", F(mean,8)],
        ["日報酬母體標準差 σ（除以 n）", F(sd,8)],
        ["計算", `${F(sd,8)} × √252 = ${F(vol)}`],["顯示值", fmtPct(m.volatility)]],
      note:"用母體標準差（分母 n，Excel 的 STDEV.P）；√252 為台股年交易日數慣例。日報酬序列可由「匯出每日權益 CSV」取得。"},
    cagr: {title:"年化報酬率 (CAGR)", formula:"CAGR = (期末權益 ÷ 期初本金) ^ (1 ÷ 年數) − 1\n年數 = 日曆天數 ÷ 365.25",
      steps:[["期初 E₀ / 期末 E₁", `${fmtNum(E0)} / ${fmtNum(E1)}`],
        ["日曆天數（首尾日期差）", `${days} 天`],["年數", F(years,4)],
        ["計算", `(${F(E1/E0,6)}) ^ (1/${F(years,4)}) − 1 = ${F(Math.pow(E1/E0,1/years)-1)}`],
        ["顯示值", fmtPct(m.cagr,true)]],
      note:"幾何年化：短區間會把報酬複利外推到一整年，區間越短數字越誇大，解讀時要注意。"},
    win: {title:"勝率", formula:"勝率 = 獲利交易筆數 ÷ 總交易筆數",
      steps:[["獲利筆數（報酬率 > 0）", wins.length],["虧損筆數（報酬率 < 0）", losses.length],
        ["總筆數", r.trades.length],
        ["計算", r.trades.length? `${wins.length} ÷ ${r.trades.length} = ${F(wins.length/r.trades.length)}` : "-"],
        ["顯示值", fmtPct(m.win_rate)]],
      note:"逐筆交易統計（含期末強制平倉那筆）。每筆報酬率見「逐筆交易明細」表。"},
    payoff: {title:"賺賠比", formula:"賺賠比 = 平均獲利 ÷ |平均虧損|",
      steps:[["獲利交易平均報酬", fmtPct(avgW,true)],["虧損交易平均報酬", fmtPct(avgL,true)],
        ["計算", (isFinite(avgW)&&isFinite(avgL))? `${F(avgW,6)} ÷ |${F(avgL,6)}| = ${F(avgW/Math.abs(avgL))}` : "-（需同時有獲利與虧損交易）"],
        ["顯示值", fmtNum(m.payoff_ratio)]],
      note:"僅分別對「有賺」「有賠」的交易取平均；若全勝或全敗則無法計算，顯示 -。"},
    sharpe: {title:"夏普比率（Rf 0%）", formula:"夏普 = (日報酬平均 × 252) ÷ (日報酬標準差 × √252)",
      steps:[["日報酬平均 μ", F(mean,8)],["年化報酬（μ×252）", F(mean*252)],
        ["年化波動（σ×√252）", F(vol)],
        ["計算", `${F(mean*252)} ÷ ${F(vol)} = ${F(mean*252/vol)}`],
        ["顯示值", fmtNum(m.sharpe)]],
      note:"本頁未扣無風險利率（Rf=0）。「⑤ 組合績效」頁的夏普以（年化報酬 − Rf）為分子，Rf 可自訂。"},
    mdd: {title:"原始最大回撤", formula:"最大回撤 = min( 當日權益 ÷ 截至當日歷史最高權益 − 1 )",
      steps:[["回撤前高點", `${dts[mddPeakI]}，權益 ${fmtNum(eq[mddPeakI])}`],
        ["回撤谷底", `${dts[troughI]}，權益 ${fmtNum(eq[troughI])}`],
        ["計算", `${fmtNum(eq[troughI])} ÷ ${fmtNum(eq[mddPeakI])} − 1 = ${F(eq[troughI]/eq[mddPeakI]-1)}`],
        ["顯示值", fmtPct(m.max_drawdown)]],
      note:"逐日檢查（日線口徑，含持倉期間未實現損益）。「匯出每日權益 CSV」的「當日權益 ÷ 當日歷史最高權益 − 1」取最小值即可驗算。"},
    ntr: {title:"交易次數", formula:"交易次數 = 已平倉交易筆數（含期末強制平倉）",
      steps:[["訊號出場", reasonCount("訊號出場")],["停損出場", reasonCount("停損")],
        ["期末平倉", reasonCount("期末平倉")],["合計", r.trades.length]],
      note:"一買一賣算一筆。期末仍持有的部位以最後一天收盤價強制平倉並計入。"},
  };
}

/* ---------- MC helpers: treat the selection as one portfolio ---------- */
function portfolioTradeReturns(bt){
  // merge every code's trades chronologically; each trade acts on a 1/N
  // equal-weight slice, so its portfolio-level return is scaled by 1/N
  const results = Object.values(bt.results);
  const n = results.length;
  const all = [];
  results.forEach(r=>r.trades.forEach(t=>
    all.push({exit_date:t.exit_date, ret:t.return/n, code:r.code})));
  all.sort((a,b)=> a.exit_date < b.exit_date ? -1 : 1);
  return all.map(t=>t.ret);
}
function mcTargetLabel(bt, target){
  if(target==="__pf__"){
    const n = Object.keys(bt.results).length;
    return `投資組合（${n} 檔等權重合併）`;
  }
  const r = bt.results[target];
  return r ? `${r.code} ${r.name}` : target;
}
function mcTradeReturns(bt, target){
  if(target==="__pf__") return portfolioTradeReturns(bt);
  const r = bt.results[target];
  return r ? r.trades.map(t=>t.return) : [];
}

function percentileOf(arr, q){
  const a=[...arr].sort((x,y)=>x-y);
  const idx=(a.length-1)*q/100, lo=Math.floor(idx), hi=Math.ceil(idx);
  return a[lo]+(a[hi]-a[lo])*(idx-lo);
}

/* ---------- page 5: combined portfolio vs benchmark ---------- */
const COMPARE_PALETTE = ["#2563eb","#0d9488","#d97706","#7c3aed","#dc2626","#059669","#db2777","#4b5563"];

function seriesStats(equity, dates){
  const n = equity.length;
  const total = equity[n-1]/equity[0]-1;
  const days = (new Date(dates[n-1]) - new Date(dates[0]))/864e5;
  const years = days/365.25;
  const cagr = years>0 ? Math.pow(equity[n-1]/equity[0], 1/years)-1 : NaN;
  const rets = []; for(let i=1;i<n;i++) rets.push(equity[i]/equity[i-1]-1);
  const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
  const vol = Math.sqrt(rets.reduce((a,b)=>a+(b-mean)*(b-mean),0)/rets.length)*Math.sqrt(252);
  const sharpe = vol>0 ? mean*252/vol : NaN;
  let peak=-Infinity, mdd=0;
  for(const v of equity){ if(v>peak)peak=v; const dd=v/peak-1; if(dd<mdd)mdd=dd; }
  return {total, cagr, vol, sharpe, mdd, rets};
}
function skewKurt(rets){
  const n = rets.length;
  if(n < 4) return {skew:NaN, kurt:NaN};
  const mean = rets.reduce((a,b)=>a+b,0)/n;
  let m2=0,m3=0,m4=0;
  for(const r of rets){ const d=r-mean; m2+=d*d; m3+=d*d*d; m4+=d*d*d*d; }
  m2/=n; m3/=n; m4/=n;
  return {skew: m3/Math.pow(m2,1.5), kurt: m4/(m2*m2)};
}
function correlationOf(a, b){
  const n = Math.min(a.length, b.length);
  if(n<3) return NaN;
  const am=a.slice(0,n).reduce((x,y)=>x+y,0)/n, bm=b.slice(0,n).reduce((x,y)=>x+y,0)/n;
  let saa=0, sbb=0, sab=0;
  for(let i=0;i<n;i++){ saa+=(a[i]-am)**2; sbb+=(b[i]-bm)**2; sab+=(a[i]-am)*(b[i]-bm); }
  return (saa>0&&sbb>0) ? sab/Math.sqrt(saa*sbb) : NaN;
}
function drawdownEpisodes(equity, dates, topN=5){
  // TEJ-style episode table: 回撤起始日(前高)、谷底日、虧損回復日、深度、落水期間
  const eps=[];
  let peakIdx=0, troughIdx=0, inDD=false;
  for(let i=1;i<equity.length;i++){
    if(equity[i] >= equity[peakIdx]){
      if(inDD){
        eps.push({startIdx:peakIdx, troughIdx, recoverIdx:i,
          depth: equity[troughIdx]/equity[peakIdx]-1});
        inDD=false;
      }
      peakIdx=i;
    }else{
      if(!inDD){ inDD=true; troughIdx=i; }
      else if(equity[i] < equity[troughIdx]) troughIdx=i;
    }
  }
  if(inDD) eps.push({startIdx:peakIdx, troughIdx, recoverIdx:null,
    depth: equity[troughIdx]/equity[peakIdx]-1});
  eps.sort((a,b)=>a.depth-b.depth);
  return eps.slice(0,topN).map(e=>({
    start: dates[e.startIdx], trough: dates[e.troughIdx],
    recover: e.recoverIdx==null? null : dates[e.recoverIdx],
    depth: e.depth,
    downDays: e.troughIdx - e.startIdx,
    recoverDays: e.recoverIdx==null? null : e.recoverIdx - e.troughIdx,
  }));
}
function annualReturns(equity, dates){
  const byYear = {};
  dates.forEach((d,i)=>{ const y=d.slice(0,4); if(!(y in byYear)) byYear[y]={first:i}; byYear[y].last=i; });
  const years = Object.keys(byYear).sort();
  return years.map((y,k)=>{
    const prev = k>0 ? byYear[years[k-1]].last : byYear[y].first;
    return {year:y, ret: equity[byYear[y].last]/equity[prev]-1};
  });
}
function olsAlphaBeta(rp, rm){
  const n = Math.min(rp.length, rm.length);
  if(n<3) return null;
  const x=rm.slice(0,n), y=rp.slice(0,n);
  const xb=x.reduce((a,b)=>a+b,0)/n, yb=y.reduce((a,b)=>a+b,0)/n;
  let sxx=0, sxy=0;
  for(let i=0;i<n;i++){ sxx+=(x[i]-xb)*(x[i]-xb); sxy+=(x[i]-xb)*(y[i]-yb); }
  if(sxx<=0) return null;
  const beta = sxy/sxx, alpha = yb - beta*xb;
  return {beta, alphaAnnual: alpha*252};
}

function PortfolioPage({bt, setup}){
  const [bench, setBench] = useState(null);
  const [rf, setRf] = useState(1.6);  // 無風險利率（年%，預設近似一年期定存）
  useEffect(()=>{
    if(!bt) return;
    apiGet(`/api/benchmark?start=${setup.start}&end=${setup.end}`).then(setBench).catch(()=>setBench({dates:[],closes:[]}));
  },[bt]);
  if(!bt) return <Card><div className="text-slate-400 text-sm">請先完成回測。</div></Card>;

  const results = Object.values(bt.results);
  const capital = setup.capital;

  // ---- combine per-code strategy equity into one equal-weight portfolio
  const dateSet = new Set();
  results.forEach(r=>r.dates.forEach(d=>dateSet.add(d)));
  const allDates = [...dateSet].sort();
  const growth = results.map(r=>{
    const map = new Map(r.dates.map((d,i)=>[d, r.equity_curve[i]/capital]));
    let last = 1; // before a code's first bar its slice sits in cash (growth 1)
    return allDates.map(d=>{ if(map.has(d)) last = map.get(d); return last; });
  });
  const pf = allDates.map((_,i)=> capital * growth.reduce((a,g)=>a+g[i],0)/results.length);
  const pfStats = seriesStats(pf, allDates);

  // ---- benchmark aligned to the same dates
  let benchEq = null, benchStats = null, ab = null, benchAnnual = null;
  if(bench && bench.dates.length>1){
    const bmap = new Map(bench.dates.map((d,i)=>[d, bench.closes[i]]));
    let last = null;
    const closes = allDates.map(d=>{ if(bmap.has(d)) last=bmap.get(d); return last; });
    const firstIdx = closes.findIndex(v=>v!=null);
    if(firstIdx>=0 && firstIdx < allDates.length-1){
      const base = closes[firstIdx];
      benchEq = closes.map(v=> v==null ? null : capital*v/base);
      const validEq = benchEq.filter(v=>v!=null);
      const validDates = allDates.filter((_,i)=>benchEq[i]!=null);
      benchStats = seriesStats(validEq, validDates);
      ab = olsAlphaBeta(pfStats.rets, benchStats.rets);
      benchAnnual = annualReturns(validEq, validDates);
    }
  }
  const excess = benchStats ? pfStats.total - benchStats.total : null;
  const beats = excess!=null ? excess>0 : null;

  // ---- TEJ-style extended risk metrics
  const rfA = rf/100;
  const rets = pfStats.rets;
  const annArith = rets.reduce((a,b)=>a+b,0)/rets.length*252;
  const {skew, kurt} = skewKurt(rets);
  const corr = benchStats ? correlationOf(rets, benchStats.rets) : NaN;
  const downsideDev = Math.sqrt(rets.reduce((a,b)=>a+Math.min(b,0)**2,0)/rets.length)*Math.sqrt(252);
  const sharpeRf = pfStats.vol>0 ? (annArith-rfA)/pfStats.vol : NaN;
  const sortino = downsideDev>0 ? (annArith-rfA)/downsideDev : NaN;
  const treynor = (ab && Math.abs(ab.beta)>1e-9) ? (annArith-rfA)/ab.beta : NaN;
  let infoRatio = NaN;
  if(benchStats){
    const n=Math.min(rets.length, benchStats.rets.length);
    const diffs=[]; for(let i=0;i<n;i++) diffs.push(rets[i]-benchStats.rets[i]);
    const dm=diffs.reduce((a,b)=>a+b,0)/n;
    const ds=Math.sqrt(diffs.reduce((a,b)=>a+(b-dm)*(b-dm),0)/n);
    infoRatio = ds>0 ? dm*252/(ds*Math.sqrt(252)) : NaN;
  }
  const winRate = rets.filter(r=>r>0).length/rets.length;
  const expectancyDaily = rets.reduce((a,b)=>a+b,0)/rets.length;
  const pfAnnual = annualReturns(pf, allDates);
  const ddEps = drawdownEpisodes(pf, allDates, 5);

  const eqSpec = {
    data: [
      {x:allDates, y:pf, type:"scatter", mode:"lines", name:"組合策略（等權重）",
       line:{color:"#2563eb", width:2.5}},
      ...(benchEq ? [{x:allDates, y:benchEq, type:"scatter", mode:"lines",
        name:"櫃買指數（同額投入）", line:{color:"#64748b", width:2, dash:"dash"}}] : []),
      ...results.map((r,i)=>({x:r.dates, y:r.equity_curve, type:"scatter", mode:"lines",
        name:`${r.code} ${r.name}`, line:{color:COMPARE_PALETTE[i%8], width:1}, opacity:0.45})),
    ],
    layout:{title:{text:"組合權益曲線 vs 大盤", font:{size:14}}, yaxis:{tickformat:",.0f"},
      legend:{orientation:"h", y:1.18}}
  };
  let peak=-Infinity;
  const dd = pf.map(v=>{ if(v>peak)peak=v; return v/peak-1; });
  const ddSpec = {
    data:[{x:allDates, y:dd, type:"scatter", mode:"lines", fill:"tozeroy",
      line:{color:"#dc2626", width:1.5}, name:"組合回撤"}],
    layout:{title:{text:"組合回撤", font:{size:14}}, yaxis:{tickformat:",.0%"}}
  };

  return <div className="grid gap-4">
    {beats!=null &&
      <div className={"rounded-xl border p-4 text-sm "+(beats?"bg-red-50 border-red-200":"bg-emerald-50 border-emerald-200")}>
        <div className="font-bold mb-1">{beats ? "✓ 組合策略跑贏大盤" : "✗ 組合策略未跑贏大盤"}</div>
        <div>
          將所選 <b>{results.length}</b> 檔標的等權重組成一個投資組合策略：期間報酬
          <b className="tabular"> {fmtPct(pfStats.total,true)}</b>，同期櫃買指數
          <b className="tabular"> {fmtPct(benchStats.total,true)}</b>，超額報酬
          <b className={"tabular "+retColor(excess)}> {fmtPct(excess,true)}</b>。
          {ab && <span>　組合 Beta <b className="tabular">{ab.beta.toFixed(2)}</b>、年化 Alpha <b className="tabular">{fmtPct(ab.alphaAnnual,true)}</b>。</span>}
        </div>
      </div>}
    {beats==null &&
      <div className="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-500">
        此區間無櫃買指數資料，無法做大盤比較（僅顯示組合本身績效）。
      </div>}

    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
      <Metric label="組合報酬率" value={fmtPct(pfStats.total,true)} cls={retColor(pfStats.total)}/>
      <Metric label="大盤報酬率" value={benchStats?fmtPct(benchStats.total,true):"-"} cls={benchStats?retColor(benchStats.total):""}/>
      <Metric label="超額報酬" value={excess!=null?fmtPct(excess,true):"-"} cls={excess!=null?retColor(excess):""}/>
      <Metric label="年化報酬率" value={fmtPct(pfStats.cagr,true)} cls={retColor(pfStats.cagr)}/>
      <Metric label="組合波動率" value={fmtPct(pfStats.vol)}/>
      <Metric label="大盤波動率" value={benchStats?fmtPct(benchStats.vol):"-"}/>
      <Metric label={`夏普比率（Rf ${rf}%）`} value={fmtNum(sharpeRf)}/>
      <Metric label="組合最大回撤" value={fmtPct(pfStats.mdd)} cls="text-emerald-700"/>
    </div>

    <Card>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-3">
        <h2 className="text-sm font-bold text-slate-700">風險績效指標</h2>
        <label className="flex items-center gap-2 text-xs text-slate-500">
          無風險利率（年 %）
          <input type="number" step="0.1" min="0" value={rf}
            onChange={e=>setRf(+e.target.value||0)}
            className="border border-slate-300 rounded-lg px-2 py-1 w-20 text-sm tabular"/>
        </label>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-x-6 gap-y-3 text-sm tabular">
        {[
          ["算術平均報酬（年化）", fmtPct(annArith,true), retColor(annArith)],
          ["幾何平均報酬（年化）", fmtPct(pfStats.cagr,true), retColor(pfStats.cagr)],
          ["年化標準差", fmtPct(pfStats.vol), ""],
          ["下跌標準差（年化）", fmtPct(downsideDev), ""],
          ["偏態", fmtNum(skew,3), skew<0?"text-emerald-700":""],
          ["峰態", fmtNum(kurt,2), kurt>3?"text-amber-600":""],
          ["相關係數（對大盤）", fmtNum(corr,3), ""],
          ["Beta", ab?fmtNum(ab.beta,3):"-", ""],
          ["Alpha（年化）", ab?fmtPct(ab.alphaAnnual,true):"-", ab?retColor(ab.alphaAnnual):""],
          ["夏普指標", fmtNum(sharpeRf), ""],
          ["索提諾指標", fmtNum(sortino), ""],
          ["崔諾指標", fmtNum(treynor), ""],
          ["信息指標", fmtNum(infoRatio), ""],
          ["勝率（日）", fmtPct(winRate), ""],
          ["期望值（單日）", fmtPct(expectancyDaily,true), retColor(expectancyDaily)],
        ].map(([k,v,c])=>
          <div key={k} className="flex justify-between border-b border-slate-100 pb-1">
            <span className="text-slate-500">{k}</span><b className={c}>{v}</b>
          </div>)}
      </div>
      <div className="text-xs text-slate-400 mt-3">
        夏普／索提諾／崔諾皆以（算術平均年化報酬 − 無風險利率）為分子，<b>目前採用 Rf = {rf}%</b>（可於右上調整，數值即時重算）；
        偏態 &lt; 0 表示有巨大損失的潛在風險、峰態 &gt; 3 表示分佈高狹易受極端值影響；
        信息指標衡量相對大盤的超額報酬穩定度；期望值＝上漲機率×平均漲幅＋下跌機率×平均跌幅。
      </div>
    </Card>

    {pfAnnual.length>1 && <Card>
      <PlotBox spec={{
        data:[
          {x:pfAnnual.map(a=>a.year), y:pfAnnual.map(a=>a.ret), type:"bar", name:"組合",
           marker:{color:"#2563eb"}},
          ...(benchAnnual? [{x:benchAnnual.map(a=>a.year), y:benchAnnual.map(a=>a.ret), type:"bar",
           name:"櫃買指數", marker:{color:"#94a3b8"}}] : []),
        ],
        layout:{title:{text:"各年度報酬", font:{size:14}}, barmode:"group",
          xaxis:{type:"category"}, yaxis:{tickformat:",.0%"}, legend:{orientation:"h", y:1.15}}
      }} height={260}/>
    </Card>}

    <Card><PlotBox spec={eqSpec} height={380}/></Card>
    <Card><PlotBox spec={ddSpec} height={220}/></Card>

    <Card title="回撤明細（前 5 大）">
      <div className="overflow-x-auto">
        <table className="w-full text-sm tabular">
          <thead><tr className="text-xs text-slate-500 border-b border-slate-200">
            <th className="text-left py-2">回撤起始日</th><th className="text-left">谷底日</th>
            <th className="text-left">虧損回復日</th><th className="text-right">最大回撤</th>
            <th className="text-right">持續虧損（交易日）</th><th className="text-right">回漲期間（交易日）</th></tr></thead>
          <tbody>{ddEps.map((e,i)=>
            <tr key={i} className="border-b border-slate-100">
              <td className="py-1.5">{e.start}</td><td>{e.trough}</td>
              <td>{e.recover || <span className="text-amber-600">尚未回復</span>}</td>
              <td className="text-right text-emerald-700">{fmtPct(e.depth)}</td>
              <td className="text-right">{e.downDays}</td>
              <td className="text-right">{e.recoverDays==null?"-":e.recoverDays}</td>
            </tr>)}</tbody>
        </table>
      </div>
      <div className="text-xs text-slate-400 mt-2">部位落水期間＝回撤起始日至虧損回復日；「尚未回復」表示至回測期末仍未回到前高。</div>
    </Card>

    <Card title={`成分標的（等權重，各佔 ${fmtPct(1/results.length)}）`}>
      <div className="overflow-x-auto">
        <table className="w-full text-sm tabular">
          <thead><tr className="text-xs text-slate-500 border-b border-slate-200">
            <th className="text-left py-2">標的</th><th className="text-left">類別</th>
            <th className="text-right">個別報酬率</th><th className="text-right">個別波動率</th>
            <th className="text-right">個別最大回撤</th><th className="text-right">對組合報酬貢獻</th>
            <th className="text-right">交易數</th></tr></thead>
          <tbody>{results.map((r,i)=>{
            const contrib = r.metrics.total_return / results.length;
            return <tr key={r.code} className="border-b border-slate-100">
              <td className="py-1.5 font-medium">
                <span className="inline-block w-2.5 h-2.5 rounded-sm mr-2" style={{background:COMPARE_PALETTE[i%8]}}></span>
                {r.code} {r.name}</td>
              <td className="text-slate-500">{r.category}</td>
              <td className={"text-right "+retColor(r.metrics.total_return)}>{fmtPct(r.metrics.total_return,true)}</td>
              <td className="text-right">{fmtPct(r.metrics.volatility)}</td>
              <td className="text-right text-emerald-700">{fmtPct(r.metrics.max_drawdown)}</td>
              <td className={"text-right "+retColor(contrib)}>{fmtPct(contrib,true)}</td>
              <td className="text-right">{r.metrics.num_trades}</td>
            </tr>;})}</tbody>
        </table>
      </div>
      <div className="text-xs text-slate-400 mt-2">
        組合方式：起始本金平均分配給各標的，各自執行策略，期間不再平衡；
        某標的尚無資料的日期，其資金視為現金。Beta／Alpha 以組合日報酬對櫃買指數日報酬迴歸估計。紅漲綠跌。
      </div>
    </Card>
  </div>;
}

function WarrantValuationPage(){
  const [search, setSearch] = useState("");
  const [suggest, setSuggest] = useState([]);
  const [warrant, setWarrant] = useState(null);
  const [start, setStart] = useState("2025-07-01");
  const [end, setEnd] = useState(new Date().toISOString().slice(0,10));
  const [rf, setRf] = useState(1.6);
  const [hvWindow, setHvWindow] = useState(60);
  const [data, setData] = useState(null);
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(()=>{
    const q = search.trim();
    if(!q){ setSuggest([]); return; }
    let cancelled = false;
    apiGet("/api/securities?category=權證").then(d=>{
      if(cancelled) return;
      const ql = q.toLowerCase();
      setSuggest(d.securities.filter(s=>s.code.toLowerCase().includes(ql)||s.name.includes(q)).slice(0,15));
    });
    return ()=>{ cancelled=true; };
  },[search]);

  const runValuation = async ()=>{
    if(!warrant) return;
    setBusy(true); setErr(""); setData(null);

      setData(j);
    }catch(e){ setErr(String(e.message||e)); }

  };

    data:[
      {x:rows.map(r=>r.date), y:rows.map(r=>r.market_price), type:"scatter", mode:"lines",
       name:"市價", line:{color:"#2563eb", width:2}},
      {x:rows.map(r=>r.date), y:rows.map(r=>r.theoretical_price), type:"scatter", mode:"lines",
       name:"理論價（HV）", line:{color:"#d97706", width:2, dash:"dash"}},
    ],
    layout:{title:{text:"市價 vs 理論價", font:{size:14}}, legend:{orientation:"h", y:1.15}}
  } : null;
  const mispSpec = rows.length ? {
    data:[{x:rows.map(r=>r.date), y:rows.map(r=>r.mispricing_pct*100), type:"scatter", mode:"lines",
      fill:"tozeroy", line:{color:"#7c3aed", width:1.5}, name:"偏離度"}],
    layout:{title:{text:"價格偏離度（市價／理論價 − 1）", font:{size:14}}, yaxis:{ticksuffix:"%"}}
  } : null;
  const volSpec = rows.length ? {
    data:[
      {x:rows.map(r=>r.date), y:rows.map(r=>r.hv*100), type:"scatter", mode:"lines",
       name:"標的歷史波動率 HV", line:{color:"#0d9488", width:2}},
      {x:data.rows.filter(r=>r.iv!=null).map(r=>r.date),
       y:data.rows.filter(r=>r.iv!=null).map(r=>r.iv*100), type:"scatter", mode:"lines",
       name:"隱含波動率 IV", line:{color:"#dc2626", width:2}},
    ],
    layout:{title:{text:"隱含波動率 vs 標的歷史波動率", font:{size:14}}, yaxis:{ticksuffix:"%"}, legend:{orientation:"h", y:1.15}}
  } : null;

  const last = rows.length ? rows[rows.length-1] : null;
  const lastIvRow = data ? [...data.rows].reverse().find(r=>r.iv!=null) : null;

  return <div className="grid gap-4">
    <Card title="選擇權證">
      <div className="grid md:grid-cols-4 gap-3 items-end">
        <div className="md:col-span-2 relative">

            <input type="text" className={inputCls} value={search}
              onChange={e=>{setSearch(e.target.value); setWarrant(null);}}
              placeholder="例：705674 或 環球晶"/>
          </Field>

              <div key={s.code} className="px-3 py-2 text-sm hover:bg-slate-50 cursor-pointer"

      <div className="text-xs text-slate-400 mt-3">
        理論價使用<b>標的歷史波動率（HV）</b>代入 Black-Scholes 計算，與市價比較看價格面是否偏貴／偏便宜；
        隱含波動率（IV）則是反推自市價本身，與 HV 比較看波動率面是否偏貴／偏便宜——兩者是互補但不同的問題，
        IV 不會拿去計算理論價（那樣理論價會恆等於市價，失去比較意義）。
        美式權證以歐式模型近似（無股利下提前履約不划算，此為業界常見簡化）。
      </div>
    </Card>

    {data && <>
      <Card>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
          <div><span className="text-slate-500">標的：</span><b>{data.underlying_code} {data.underlying_name}</b></div>
          <div><span className="text-slate-500">買賣權／類型：</span><b>{data.type==="call"?"認購":"認售"}／{data.style==="american"?"美式":"歐式"}</b></div>
          <div><span className="text-slate-500">履約價：</span><b className="tabular">{fmtNum(data.strike)}</b></div>
          <div><span className="text-slate-500">履約比例：</span><b className="tabular">{data.ratio}</b></div>
          <div><span className="text-slate-500">到期日：</span><b>{data.expiry}</b></div>
          <div><span className="text-slate-500">無風險利率：</span><b>{data.risk_free_rate}%</b></div>
          <div><span className="text-slate-500">HV 窗口：</span><b>{data.hv_window} 交易日</b></div>
        </div>
      </Card>

      {last && <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <Metric label="最新市價" value={fmtNum(last.market_price)}/>
        <Metric label="最新理論價（HV）" value={fmtNum(last.theoretical_price)}/>
        <Metric label="價格偏離度" value={fmtPct(last.mispricing_pct,true)} cls={retColor(last.mispricing_pct)}/>
        <Metric label="剩餘天數" value={last.days_to_expiry+" 天"}/>
      </div>}

      {rows.length===0 && <Card><div className="text-sm text-slate-400">此區間內標的股波動率窗口不足或權證無成交資料，無法計算理論價。</div></Card>}

      {priceSpec && <Card><PlotBox spec={priceSpec} height={320}/></Card>}
      {mispSpec && <Card><PlotBox spec={mispSpec} height={220}/></Card>}
      {volSpec && <Card><PlotBox spec={volSpec} height={280}/></Card>}

      {lastIvRow && lastIvRow.greeks && <Card title={`最新 Greeks（${lastIvRow.date}，IV = ${fmtPct(lastIvRow.iv)}）`}>
        <div className="overflow-x-auto">
          <table className="w-full text-sm tabular">
            <thead><tr className="text-xs text-slate-500 border-b border-slate-200">
              <th className="text-left py-2"></th><th className="text-right">每股標準值（Δ/Γ/Vega/Θ 之教科書定義）</th>
              <th className="text-right">每張權證實際值（× 履約比例 {data.ratio}）</th></tr></thead>
            <tbody>
              {[["Delta","delta"],["Gamma","gamma"],["Vega","vega"],["Theta（每日）","theta"]].map(([label,key])=>
                <tr key={key} className="border-b border-slate-100">
                  <td className="py-1.5 font-medium">{label}</td>
                  <td className="text-right">{fmtNum(lastIvRow.greeks[key+"_per_share"],4)}</td>
                  <td className="text-right">{fmtNum(lastIvRow.greeks[key+"_per_warrant"],4)}</td>
                </tr>)}
            </tbody>
          </table>
        </div>
        <div className="text-xs text-slate-400 mt-2">
          「每股標準值」是把權證當作一般選擇權、以一股標的股計算的教科書 Greeks；
          「每張權證實際值」才是這張權證真正的曝險（已乘上履約比例），例如 Delta 0.01 代表標的漲 1 元、這張權證約漲 0.01 元。
        </div>
      </Card>}
    </>}
  </div>;
}

/* ---------- app ---------- */
const PAGES = ["① 設定","② 回測結果","③ 蒙地卡羅設定","④ 蒙地卡羅結果","⑤ 組合績效 vs 大盤","⑥ 權證評價"];
function App(){
  const [page, setPage] = useState(0);
  const [setup, setSetup] = useState({
    categories:[], industries:[], securities:[], category:"", industry:"", secCode:"",
    chips:[], start:"2025-07-01", end:"2026-07-09", strategy:"ma",
    params:{short:5, long:20, period:14, lower:30, upper:70},
    capital:1000000, riskPct:10, leverage:1, error:""
  });
  const [running, setRunning] = useState(false);
  const [bt, setBt] = useState(null);
  const [activeCode, setActiveCode] = useState("");
  const [mcState, setMcState] = useState({mode:"reshuffle", nSims:1000, job:null, target:"__pf__"});
  const [mcResults, setMcResults] = useState({});

  const runBacktest = async ()=>{
    setRunning(true); setSetup(s=>({...s, error:""}));
    try{
      const body = {codes:setup.chips.map(c=>c.code), start:setup.start, end:setup.end,
        strategy:setup.strategy, params:setup.params, capital:setup.capital,
        risk_pct:setup.riskPct, leverage:setup.leverage};
      const data = await apiPost("/api/backtest", body);
      const codes = Object.keys(data.results);
      setBt(data); setActiveCode(codes[0]); setMcResults({});
      // default MC target: the combined portfolio when multiple codes, else the single code
      setMcState(s=>({...s, job:null, target: codes.length>1 ? "__pf__" : codes[0]}));
      setPage(1);
    }catch(e){ setSetup(s=>({...s, error:String(e.message||e)})); }
    setRunning(false);
  };
  const runMC = async ()=>{
    const target = mcState.target;
    const {job_id} = await apiPost("/api/montecarlo", {
      trade_returns: mcTradeReturns(bt, target), n_sims:mcState.nSims,
      mode:mcState.mode, capital:setup.capital});
    setMcState(s=>({...s, job:{status:"running", progress:0}}));
    const poll = async ()=>{
      const j = await apiGet("/api/montecarlo/"+job_id);
      setMcState(s=>({...s, job:j}));
      if(j.status==="running") setTimeout(poll, 250);
      else if(j.status==="done"){ setMcResults(m=>({...m, [target]:j.result})); setPage(3); }
    };
    poll();
  };

  return <div className="max-w-6xl mx-auto px-4 py-6">
    <header className="mb-5">
      <h1 className="text-2xl font-bold">櫃買市場蒙地卡羅回測分析</h1>
      <p className="text-sm text-slate-500 mt-1">上櫃限定（股票／ETF／權證，另支援自訂上傳資料）｜策略回測 → 蒙地卡羅模擬 → 組合績效 vs 大盤。僅供研究，不構成投資建議。</p>
    </header>
    <nav className="flex flex-wrap gap-1 mb-5 bg-white rounded-xl border border-slate-200 p-1.5 shadow-sm">
      {PAGES.map((p,i)=>
        <button key={p} onClick={()=>setPage(i)}
          className={"px-4 py-2 rounded-lg text-sm font-medium "+(page===i?"bg-blue-600 text-white":"text-slate-600 hover:bg-slate-100")}>
          {p}
        </button>)}
    </nav>
    {page===0 && <SetupPage state={setup} setState={setSetup} onRun={runBacktest} running={running}/>}
    {page===1 && <ResultPage bt={bt} activeCode={activeCode} setActiveCode={setActiveCode}/>}
    {page===2 && <MCSetupPage bt={bt} mcState={mcState} setMcState={setMcState} onRun={runMC}/>}
    {page===3 && <MCResultPage bt={bt} mcTarget={mcState.target} mcResults={mcResults}/>}
    {page===4 && <PortfolioPage bt={bt} setup={setup}/>}
    {page===5 && <WarrantValuationPage/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
