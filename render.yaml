# Render.com Blueprint — deploy the Monte-Carlo backtest web app.
# In Render: New + → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: tpex-mc-backtest
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
